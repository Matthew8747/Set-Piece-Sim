# Fly.io deploy config for the Restart Lab API (FastAPI backend).
#
# Chosen host: Fly.io — first-class Docker (we ship apps/backend/Dockerfile),
# a free allowance, global regions, and persistent volumes for the marts +
# SQLite store. The frontend deploys separately to Vercel; Postgres (the scaled
# path) is Neon. See the README "Deploying" section.
#
#   flyctl auth login                                  # one-time, interactive
#   flyctl launch --no-deploy --copy-config --name restart-lab-api --region lhr
#   flyctl secrets set RESTART_CORS_ORIGINS='["https://YOUR-APP.vercel.app"]'
#   flyctl deploy
#
# Server-free by default (SQLite + in-process queue, marts baked into the image).
# To scale out, set RESTART_DATABASE_URL (Neon) and RESTART_REDIS_URL (Upstash).

app = "restart-lab-api"
primary_region = "lhr"

[build]
  dockerfile = "apps/backend/Dockerfile"

[env]
  RESTART_APP_ENV = "prod"
  RESTART_DEBUG = "false"
  # Non-secret; override with `fly secrets set` to the real frontend origin(s).
  RESTART_CORS_ORIGINS = '["http://localhost:3000"]'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/healthz"

# No volume: the squad/xG marts and the committed study are baked into the image,
# and the SQLite app store is ephemeral (a demo recreates the canonical scenario
# on demand). Add a [mounts] volume at /app/data later if you want persistence.

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
