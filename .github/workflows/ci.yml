name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Black (format check)
        run: uv run black --check .

      - name: Mypy (strict typecheck)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

  frontend:
    name: Frontend (build, lint, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      # Build first: it generates next-env.d.ts and .next/types, which
      # `tsc --noEmit` consumes (see apps/frontend/tsconfig.json includes).
      - name: Build
        run: npm run build

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Vitest
        run: npm run test

      - name: Prettier (format check)
        run: npm run format:check

  contract:
    name: Contract (OpenAPI / shared-types drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Sync workspaces
        run: |
          uv sync --all-packages
          npm ci

      # Regenerate the committed schema + TS client and fail if either changed
      # (ADR-007 d6 — codegen replaces hand-mirroring).
      - name: OpenAPI / shared-types drift
        run: |
          uv run python apps/backend/scripts/dump_openapi.py
          npm run gen -w "@restart/shared-types"
          git diff --exit-code -- apps/backend/openapi.json packages/shared-types/src/generated.ts
