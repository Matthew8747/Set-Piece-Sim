[project]
name = "restart-ml"
version = "0.1.0"
description = "Restart Lab System A: expected-goals (xG) models trained on real StatsBomb marts. Never trains on simulator output (design doc 06 §1)."
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.1",
    "scikit-learn>=1.5",
    "lightgbm>=4.5",
    "xgboost>=2.1",
    "mlflow>=2.18",
    "pyarrow>=18.0",
    # Reuse the data lake readers + the pure feature/scorer contract.
    "restart-etl",
    "restart-simulation-core",
]

[project.scripts]
restart-xg = "restart_ml.cli:main"

[tool.uv.sources]
restart-etl = { workspace = true }
restart-simulation-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/restart_ml"]
