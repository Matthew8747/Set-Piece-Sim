[project]
name = "restart-simulation-core"
version = "0.1.0"
description = "Pure-domain simulation core for Restart Lab: physics, agents, tactics, Monte Carlo. No web, DB, or I/O dependencies by architectural rule."
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/restart"]
