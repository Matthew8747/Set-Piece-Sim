# Local development infrastructure. The default Restart Lab install is
# server-free (SQLite + in-process queue); these back the Postgres + Arq/Redis
# drop-in adapters (ADR-007 d1/d2), selected when their URLs are configured:
#
#   docker compose -f infra/docker-compose.yml up -d
#   $env:RESTART_DATABASE_URL = "postgresql://restart:restart@localhost:5432/restart"
#   $env:RESTART_REDIS_URL    = "redis://localhost:6379"
#   uv run --extra postgres restart-etl load-postgres --dsn $env:RESTART_DATABASE_URL
#   uv run uvicorn restart_api.main:app --app-dir apps/backend/src   # API
#   uv run arq restart_api.jobs.arq_queue.WorkerSettings             # worker
#
# Credentials below are LOCAL-DEV ONLY by policy (see SECURITY section of
# docs/development-guide.md): they bind to localhost and must never be reused
# in any deployed environment.
name: restart-lab

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: restart
      POSTGRES_PASSWORD: restart
      POSTGRES_DB: restart
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restart -d restart"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
